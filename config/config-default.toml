# openai-cli user config — overrides the built-in provider defaults.
# Safe to delete: a fresh copy is recreated on the next start.
#
# You normally DO NOT edit this file. To route openai/anthropic through your
# gateway, just run:
#
#   ai login https://your-gateway:8443
#
# That authenticates (email + password) and stores a session in credentials.toml;
# routing is then derived automatically (deepseek stays direct). This file is only
# for advanced per-provider overrides — e.g. pinning a provider to a custom
# endpoint. A provider with no "baseURL" connects directly using its env API key.
#
# Example advanced override (uncomment to use):

# [providers.openai]
# baseURL = "https://gw.example.com/openai/v1"
# token = "a-static-gateway-token"
# api = "chat"  # force chat/completions instead of the default Responses API

# deepseek connects directly — no override needed.
